<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>selector</title>
    <style type="text/css">
        div{
            background:gray;
            width:200px;
            height:100px;
        }
    </style>
    <script type="text/javascript" src="../jquery-3.6.0.js"></script>
        <script type="text/javascript">
            function fun1() {
                //id选择器
                var obj = $("#one");
                //使用jQuery中改变样式的函数
                obj.css("background", "red");
            }
            function fun2() {
                //样式选择器
                var obj = $(".two");
                obj.css("background", "yellow");
            }
            function fun3() {
                //标签选择器
                var obj = $("div");
                obj.css("background", "blue");
            }
            function fun4() {
                //所有选择器
                var obj = $("*");
                obj.css("background", "green");
            }
            function fun5() {
                //混合选择器
                var obj = $("#one,span");
                obj.css("background", "pink");
            }
</script>
</head>
<body>
    <div id="one">我是one的div</div><br/>
    <div class="two">我是样式two的div</div><br/>
    <div>我是没有id,class的div</div><br/>
    <span>我是span标签</span><br/>
    <input type="button" value="获取id是one的dom对象" onclick="fun1()" /><br/>
    <input type="button" value="使用class样式获取dom对象" onclick="fun2()" /><br/>
    <input type="button" value="使用标签选择器" onclick="fun3()" /><br/>
    <input type="button" value="所有选择器" onclick="fun4()" /><br/>
    <input type="button" value="组合选择器" onclick="fun5()" /><br/>
</body>
</html>
