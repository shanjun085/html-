<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表单过滤器</title>
    <style type="text/css">
        div{
            background: grey;
        }
    </style>
    <script type="text/javascript" src="../jquery-3.6.0.js"></script>
    <script type="text/javascript">

        //$(doucment).ready(函数):当页面中的dom对象加载成功后，会执行ready
        // 相当于是onLoad().
        $(function(){
            //当页面dom对象加载后，给对象绑定事件，因此button对象已经在内存中在创建好了，才能使用.
            $("#btn1").click(function(){
                //获取所有可以使用的text
                var obj = $(":text:enabled");
                //设置 jquery 数组值所有dom对象的value值
                obj.val("hello");
            })
            $("#btn2").click(function(){
                //获取选中的checkbox
                var obj = $(":checkbox:checked");
                for(var i=0;i<obj.length;i++){
                    //alert( obj[i].value);
                    alert(   $(obj[i]).val() )
                }
            })
            $("#btn3").click(function(){
                //获取select选中的值
                //var obj = $("select>option:selected");
                var obj=$("#yuyan>option:selected");
                    alert(obj.val() );
            })
        })
    </script>
</head>
<body>
<input type="text" id="txt1" value="text1" /><br/>
<input type="text" id="txt2" value="text2" disabled="true"/><br/>
<input type="text" id="txt3" value="text3" /><br/>
<input type="text" id="txt4" value="text4" disabled/><br/>
<br/>
<input type="checkbox" value="游泳" />游泳 <br/>
<input type="checkbox" value="健身" checked />健身 <br/>
<input type="checkbox" value="电子游戏" checked />电子游戏 <br/>
<br/>
<select id="yuyan">
    <option value="java">java语言</option>
    <option value="go" selected>go语言</option>
    <option value="python">Python语言</option>
</select>

<br/>  
<input type="button" value="设置可用的text的value是hello" id="btn1"/>
<br/>
<input type="button" value=显示选中的复选框的值 id="btn2"></button><br/>
<input type="button" value=显示选中下拉列表框的值 id="btn3"></button>
<br/>
</body>
</html>
