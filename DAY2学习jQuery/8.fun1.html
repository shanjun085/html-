<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fun1</title>
    <style type="text/css">
      div {
        background: blue;
      }
    </style>
    <script type="text/javascript" src="../jquery-3.6.0.js"></script>
    <script type="text/javascript">
      $(function () {
        $("#btn1").click(function () {
          var text = $(":text").val();
          alert(text);
        });

        $("#btn2").click(function () {
          //设置所有的text的value为新值
          $(":text").val("三国演义");
        });

        $("#btn3").click(function () {
          //获取div,text()无参数,获取dom对象的文本值，连接成一个字符串
          alert($("div").text());
        });

        $("#btn4").click(function () {
          //设置div的文本值
          $("div").text("新的div文本内容");
        });

        $("#btn5").click(function () {
          //读取指定属性的值
          alert($("img").attr("src"));
        });

        $("#btn6").click(function () {
          //设置指定属性的，指定值
          $("img").attr("src", "img/ex2.jpg");
        });
      });
    </script>
  </head>

  <body>
    <p>文本框val</p>
    <input type="text" value="刘备" /><br />
    <input type="text" value="关羽" /><br />
    <input type="text" value="张飞" /><br />
    <p>文本数据text</p>
    <div>1.我是第一个div</div>
    <div>2.我是第二个div</div>
    <div>3.我是第三个div</div>
    <p>图片</p>
    <img id="img1" src="img/ex1.jpg" /><br />
    <p>功能按钮</p>
    <button id="btn1">获取第一个文本框的值</button><br />
    <button id="btn2">设置所有文本框为新值</button><br />
    <button id="btn3">获取div的所有文本</button><br />
    <button id="btn4">设置div的文本值</button><br />
    <button id="btn5">读取src属性的值</button><br />
    <button id="btn6">设置指定的属性值</button><br />
  </body>
</html>
