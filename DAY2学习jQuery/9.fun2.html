<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fun2</title>
    <style type="text/css">
      div {
        background: yellow;
      }
    </style>
    <script type="text/javascript" src="../jquery-3.6.0.js"></script>
    <script type="text/javascript">
      $(function () {
        $("#btn1").click(function () {
          //使用remove:删除父和子所有的dom对象
          $("select").remove();
        });

        $("#btn2").click(function () {
          //使用empty 删除子dom对象
          $("select").empty();
        });

        $("#btn3").click(function () {
          //使用append 增加dom对象
          //$("#father").append("<input type='button' value='我是增加的按钮' />");

          //增加一个table
          $("#father").append(
            "<table border=1><tr><td>第一列</td><td>第二列</td></tr></table>"
          );
        });
        $("#btn4").click(function () {
          //使用html()函数,获取数组中第一个dom对象的文本值(innerHTML)
          //alert($("span").text()); //我是mysql数据库
          alert($("span").html()); //我是mysql <b>数据库</b>
        });

        $("#btn5").click(function () {
          //使用 html(有参数)；设置dom对象的文本值
          $("span").html("我是新的<b>数据</b>");
        });

        $("#btn6").click(function () {
          //循环普通数组，非dom数组
          var arr = [1, 2, 3];
          $.each(arr, function (index, element) {
            alert("循环变量:" + index + "=====数组成员:" + element);
          });
        });
        $("#btn7").click(function () {
          //循环json
          var json = {
            name: "张三",
            age: 20,
          };
          $.each(json, function (index, element) {
            alert("i是key=" + index + ",n是值=" + element);
          });
        });
        $("#btn8").click(function () {
          //循环dom数组
          var domArray = $(":text"); //dom数组
          $.each(domArray, function (index, element) {
            alert("i=" + index + ",n=:" + element.value);
          });
        });
        $("#btn9").click(function () {
          //循环jquery对象，jquery对象就是dom数组
          $(":text").each(function (i, n) {
            alert("i=" + i + ", n=" + n.value);
          });
        });
      });
    </script>
  </head>

  <body>
    <input type="text" value="刘备" />
    <br />
    <input type="text" value="关羽" />
    <br />
    <input type="text" value="张飞" />
    <br />
    <select>
      <option>老虎</option>
      <option>豹</option>
      <option>狮子</option>
    </select>
    <br />
    <select>
      <option>美洲</option>
      <option>欧洲</option>
      <option>亚洲</option>
    </select>
    <br />
    <div id="father">我是父div</div>
    <br />
    <span>我是mysql<b>数据库</b></span>
    <br />
    <span>我jdbc</span>
    <br />
    <br />
    <input type="button" id="btn1" value="使用remove删除父和子对象" /> <br />
    <input type="button" id="btn2" value="使用empty删除子dom对象" /> <br />
    <input type="button" id="btn3" value="使用append,增加dom对象" /> <br />
    <input type="button" id="btn4" value="获取第一个dom的文本值" /> <br />
    <input type="button" id="btn5" value="设置span的所有dom的文本值" /> <br />
    <input type="button" id="btn6" value="循环普通数组" /> <br />
    <input type="button" id="btn7" value="循环json数组" /> <br />
    <input type="button" id="btn8" value="循环dom数组" /> <br />
    <input type="button" id="btn9" value="循环jquery对象" /> <br />
  </body>
</html>
