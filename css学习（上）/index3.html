</head>
<body>
    <!--padding内部空间＆margin外部空间-->
    <h1>css教学</h1>
    <div style="background-color:lightblue; border:1px solid black;">
     大家好我是小白，接下来要介绍的是padding＆margin

   <div style="padding:20px; margin: 20px; background-color:lightblue; border:1px solid black;">

    </div>

     大家好我是小白，接下来要介绍的是padding顶部＆margin底部
    </div>
    <div style="padding:20px 30px 40px 50px; margin: 20px 50px 40px 30px; background-color:lightblue; border:1px solid black;">
     大家好我是小白，接下来要介绍的是padding＆margin,上下右左，margin可以是负值，但padding不行
    </div>
